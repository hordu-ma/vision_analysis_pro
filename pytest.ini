# Pytest 配置
[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --cov=src/vision_analysis_pro --cov-report=term-missing
markers =
    unit: 纯单元测试，不依赖真实模型或外部服务
    integration: 集成测试，覆盖模块间协作
    model: 依赖真实模型文件的测试
    e2e: 端到端测试，覆盖完整请求链路

# 异步测试支持
asyncio_mode = auto
